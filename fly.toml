# Fly.io config. Rename `app` to your chosen name before first deploy.
app = "telugu-practice"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  # Progress SQLite DB lives on the mounted volume so it survives deploys.
  DATA_DIR = "/data"
  # The app reads process.env.PORT; Fly does NOT auto-set it for Dockerfile
  # apps, so pin it to the internal_port the proxy routes to.
  PORT = "8080"

[mounts]
  # Create once: fly volumes create telugu_data --size 1
  source = "telugu_data"
  destination = "/data"

[http_service]
  # Must match the Dockerfile EXPOSE and PORT (set in [env]); the app listens here.
  internal_port = 8080
  force_https = true
  # Always-on single machine: keep it warm to hold the persistent WebSocket
  # connections to the STT/TTS providers (do not auto-stop).
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  # WebSockets ride the same http_service; Fly upgrades automatically, no extra config.

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
